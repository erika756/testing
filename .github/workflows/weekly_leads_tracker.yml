name: Weekly Leads Tracker

on:
  schedule:
    - cron: "0 7 * * 1"   # Every Monday 07:00 UTC
  workflow_dispatch:        # Run manually anytime from GitHub UI

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit the generated HTML back

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Generate dashboard
        env:
          ASANA_TOKEN: ${{ secrets.ASANA_TOKEN }}
        run: python scripts/update_leads_tracker.py

      - name: Commit & push updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leads-tracker.html
          git diff --cached --quiet || git commit -m "chore: update leads tracker $(date +'%Y-%m-%d')"
          git push
